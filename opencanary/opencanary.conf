{
    "device.node_id": "honeypot-iot-01",
    "logging.file": "/var/log/opencanary/opencanary.log",
    "logging.json": true,
    "logger": {
        "class": "PyLogger",
        "kwargs": {
            "handlers": {
                "file": {
                    "class": "logging.FileHandler",
                    "filename": "/var/log/opencanary/opencanary.log"
                }
            }
        }
    },

    "ftp.enabled": true,
    "ftp.port": 21,
    "ftp.banner": "FTP server ready",

    "http.enabled": true,
    "http.port": 80,
    "http.banner": "Apache/2.2.22 (Ubuntu)",
    "http.skin": "basicLogin",

    "httpproxy.enabled": false,

    "mysql.enabled": true,
    "mysql.port": 3306,
    "mysql.banner": "5.5.43-0ubuntu0.14.04.1",

    "ssh.enabled": false,

    "telnet.enabled": false,

    "vnc.enabled": true,
    "vnc.port": 5900,

    "snmp.enabled": true,
    "snmp.port": 161,

    "redis.enabled": false,

    "tftp.enabled": false,

    "ntp.enabled": false,

    "tcp.banner.enabled": true,
    "tcp.banner.port": 8080,
    "tcp.banner.datareceivedbanner": "HTTP/1.0 200 OK\r\n\r\n<html><head><title>Router Admin</title></head><body><h1>Router Configuration Panel</h1></body></html>"
}
