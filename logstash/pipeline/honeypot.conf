input {
  file {
    path => "/cowrie-logs/cowrie.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
    tags => ["cowrie", "honeypot", "ssh"]
  }

  file {
    path => "/opencanary-logs/opencanary.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
    tags => ["opencanary", "honeypot"]
  }
}

filter {
  # ── Cowrie events ──────────────────────────
  if "cowrie" in [tags] {

    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }

    # Geolokalizacja IP atakującego
    if [src_ip] {
      geoip {
        source => "src_ip"
        target => "geoip"
      }
      mutate {
        add_field => { "attacker_ip" => "%{src_ip}" }
      }
    }

    # Kategoryzacja eventów
    if [eventid] == "cowrie.login.failed" {
      mutate {
        add_field => { "event_type" => "login_failed" }
        add_field => { "severity" => "medium" }
      }
    }

    if [eventid] == "cowrie.login.success" {
      mutate {
        add_field => { "event_type" => "login_success" }
        add_field => { "severity" => "high" }
      }
    }

    if [eventid] == "cowrie.command.input" {
      mutate {
        add_field => { "event_type" => "command_executed" }
        add_field => { "severity" => "critical" }
      }
    }

    if [eventid] == "cowrie.session.file_download" {
      mutate {
        add_field => { "event_type" => "malware_download" }
        add_field => { "severity" => "critical" }
      }
    }
  }

  # ── OpenCanary events ──────────────────────
  if "opencanary" in [tags] {

    if [dst_port] == 21 {
      mutate { add_field => { "service" => "FTP" } }
    }
    if [dst_port] == 80 or [dst_port] == 8080 {
      mutate { add_field => { "service" => "HTTP" } }
    }
    if [dst_port] == 3306 {
      mutate { add_field => { "service" => "MySQL" } }
    }
    if [dst_port] == 5900 {
      mutate { add_field => { "service" => "VNC" } }
    }

    if [src_host] {
      geoip {
        source => "src_host"
        target => "geoip"
      }
    }
  }

  # Usuń niepotrzebne pola
  mutate {
    remove_field => ["host", "agent", "log", "ecs"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "honeypot-%{+YYYY.MM.dd}"
  }

  # Debug w konsoli (możesz wyłączyć)
  stdout {
    codec => rubydebug
  }
}
